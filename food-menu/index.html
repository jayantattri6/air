<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flip Book</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Script -->
    <script src="./script.js" defer></script>
</head>

<body>
    <!-- Background -->
    <div class="background_blur"></div>
    <main>
        <input type="checkbox" id="cover_checkbox">
        <input type="checkbox" id="back_cover_checkbox">
        <input type="checkbox" id="page1_checkbox">
        <input type="checkbox" id="page2_checkbox">
        <input type="checkbox" id="page3_checkbox">
        <input type="checkbox" id="page4_checkbox">
        <input type="checkbox" id="page5_checkbox">
        <input type="checkbox" id="page6_checkbox">
        <input type="checkbox" id="page7_checkbox">
        <input type="checkbox" id="page8_checkbox">
        <input type="checkbox" id="page9_checkbox">
        <input type="checkbox" id="page10_checkbox">
        <input type="checkbox" id="page11_checkbox">

        <!-- Flip Book -->
        <div id="flip_book">
            <div class="front_cover">
                <label for="cover_checkbox" id="cover"></label>
                <label for="cover_checkbox" id="cover_close"></label>
            </div>

            <div class="page" id="page1">
                <div class="front_page">
                    <label for="page1_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/front_page_edge_shading.webp" alt="Front page edge shading">
                    <img class="front_content" src="./assets/images/pages/food menu 1.avif" alt="Front content">
                </div>

                <div class="back_page">
                    <label for="page1_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/back_page_edge_shading.webp" alt="Back page edge shading">
                    <img class="back_content" src="./assets/images/pages/food menu 2.avif" alt="Back content">
                </div>
            </div>

            <div class="page" id="page2">
                <div class="front_page">
                    <label for="page2_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/front_page_edge_shading.webp" alt="Front page edge shading">
                    <img class="front_content" src="./assets/images/pages/food menu 3.avif" alt="Front content">
                </div>

                <div class="back_page">
                    <label for="page2_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/back_page_edge_shading.webp" alt="Back page edge shading">
                    <img class="back_content" src="./assets/images/pages/food menu 4.avif" alt="Back content">
                </div>
            </div>

            <div class="page" id="page3">
                <div class="front_page">
                    <label for="page3_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/front_page_edge_shading.webp" alt="Front page edge shading">
                    <img class="front_content" src="./assets/images/pages/food menu 5.avif" alt="Front content">
                </div>

                <div class="back_page">
                    <label for="page3_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/back_page_edge_shading.webp" alt="Back page edge shading">
                    <img class="back_content" src="./assets/images/pages/food menu 6.avif" alt="Back content">
                </div>
            </div>

            <div class="page" id="page4">
                <div class="front_page">
                    <label for="page4_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/front_page_edge_shading.webp" alt="Front page edge shading">
                    <img class="front_content" src="./assets/images/pages/food menu 7.avif" alt="Front content">
                </div>

                <div class="back_page">
                    <label for="page4_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/back_page_edge_shading.webp" alt="Back page edge shading">
                    <img class="back_content" src="./assets/images/pages/food menu 8.avif" alt="Back content">
                </div>
            </div>

            <div class="page" id="page5">
                <div class="front_page">
                    <label for="page5_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/front_page_edge_shading.webp" alt="Front page edge shading">
                    <img class="front_content" src="./assets/images/pages/food menu 9.avif" alt="Front content">
                </div>

                <div class="back_page">
                    <label for="page5_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/back_page_edge_shading.webp" alt="Back page edge shading">
                    <img class="back_content" src="./assets/images/pages/food menu 10.avif" alt="Back content">
                </div>
            </div>

            <div class="page" id="page6">
                <div class="front_page">
                    <label for="page6_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/front_page_edge_shading.webp" alt="Front page edge shading">
                    <img class="front_content" src="./assets/images/pages/food menu 11.avif" alt="Front content">
                </div>
            </div>

            <div class="back_cover">
                <label for="back_cover_checkbox"></label>
            </div>
        </div>
    </main>
</body>

</html>
